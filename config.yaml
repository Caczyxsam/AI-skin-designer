# cs2-skin-ai configuration. Override any field; delete the file to use defaults.
device: cuda

generation:
  # Backend: "sdxl" (default, fast, full UV-ControlNet) or "flux" (higher quality + prompt-following,
  # slower, more VRAM). FLUX downloads ~15GB on first use; uses a GGUF transformer to fit 16GB.
  # NOTE: FLUX models are GATED on Hugging Face — set backend: flux requires a one-time
  #   `huggingface_cli login` (token) + accepting the model terms. SDXL needs no login.
  backend: sdxl

  # SDXL backend
  base_model: stabilityai/stable-diffusion-xl-base-1.0
  controlnet_model: diffusers/controlnet-canny-sdxl-1.0

  # FLUX backend (only used when backend: flux)
  flux_model: black-forest-labs/FLUX.1-schnell
  flux_transformer_gguf: "https://huggingface.co/city96/FLUX.1-schnell-gguf/blob/main/flux1-schnell-Q4_K_S.gguf"
  flux_controlnet: ""           # optional FLUX canny ControlNet for UV alignment (dev models)
  flux_steps: 4                 # schnell = 4, dev ~28
  flux_guidance: 0.0            # schnell = 0, dev ~3.5

  resolution: 1024              # SD tile size
  texture_resolution: 2048      # exported TGA map size (2048 or 4096)
  steps: 30
  guidance_scale: 6.5
  controlnet_scale: 0.55        # 0.4-0.7: higher = art hugs the weapon UV layout more tightly
  seed: -1                      # -1 = derive from prompt
  dtype: float16
